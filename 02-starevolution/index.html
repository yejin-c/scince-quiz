<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우주 탐사선 코스모스호의 탈출 - 방탈출 문제</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Arial', sans-serif;
            margin: 20px;
            line-height: 1.6;
            background-color: #0d1117;
            color: #c9d1d9;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #30363d;
        }

        h1 {
            color: #58a6ff;
            margin: 0;
            font-size: 2em;
        }

        h2 {
            color: #a5d6ff;
            font-weight: normal;
            margin: 5px 0 0;
            font-size: 1.2em;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #161b22;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .intro {
            margin-bottom: 30px;
            background-color: #21262d;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #30363d;
        }

        .intro p {
            margin: 0;
        }

        .gate {
            margin-bottom: 30px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
        }

        .gate:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .gate h3 {
            color: #f0f6fc;
            margin: 0 0 10px;
            font-size: 1.2em;
            display: inline-block;
            margin-right: 10px;
        }

        .problem {
            margin: 10px 0;
        }

        .hint-button {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .hint-button:hover {
            background-color: #2c974b;
        }

        .hint-text {
            display: none;
            margin-top: 10px;
            color: #8b949e;
            font-style: italic;
            border-left: 3px solid #f8e3a1;
            padding-left: 10px;
        }

        .answer-input {
            margin-top: 15px;
            display: flex;
            align-items: center;
        }

        .answer-input label {
            margin-right: 10px;
            color: #8b949e;
        }

        .answer-input input[type="text"] {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 1em;
            width: 200px;
        }

        .answer-input input[type="text"]:focus {
            border-color: #58a6ff;
            outline: none;
        }

        .submit-button {
            background-color: #58a6ff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-left: 10px;
        }

        .submit-button:hover {
            background-color: #4a90e2;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        #result.correct {
            color: #2ea44f;
        }

        #result.incorrect {
            color: #da3633;
        }

        .success-area {
            display: none;
            margin-top: 40px;
            background-color: #21262d;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #2ea44f;
            text-align: center;
        }

        .success-area h2 {
            color: #2ea44f;
            font-weight: bold;
        }

        .success-area p {
            margin: 15px 0 0;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <header>
        <h1>우주 탐사선 코스모스호의 탈출</h1>
        <h2>방탈출 문제</h2>
    </header>

    <div class="container">
        <div class="intro">
            <p><strong>상황:</strong> 당신은 우주 탐사선 코스모스호의 함장입니다. 갑작스러운 엔진 고장으로 블랙홀 근처에 갇혔습니다. 함선의 인공지능(AI)이 제시하는 별의 진화에 관한 6가지 보안 코드를 풀어야 무사히 지구로 귀환할 수 있습니다.</p>
        </div>

        <div id="quiz-area">
            </div>

        <div id="result"></div>
    </div>

    <div id="success-area" class="success-area">
        <h2>🎉 탈출 성공! 🎉</h2>
        <p>코스모스호의 엔진이 다시 힘차게 가동되기 시작했습니다.<br> 모든 보안 코드를 성공적으로 해제하여 블랙홀의 중력권에서 벗어나 지구로 무사히 귀환합니다.<br> 함장님, 수고하셨습니다!</p>
    </div>

    <script>
        const questions = [
            {
                title: "제1관문: 별의 에너지원",
                problem: "별은 일생의 대부분을 이 단계에서 보냅니다. 중심부에서 수소 핵융합 반응을 통해 에너지를 방출하며 중력과 내부 압력이 평형을 이루어 크기가 일정한 이 별의 단계는 무엇인가요?",
                hint: "태양은 현재 이 단계에 있습니다.",
                answer: "주계열" // 정답은 공백 없이 입력
            },
            {
                title: "제2관문: 태양급 별의 운명",
                problem: "태양과 질량이 비슷한 별은 주계열 단계가 끝나면 중심부가 수축하며 온도가 높아져 헬륨 핵융합이 일어납니다. 이때 별의 크기가 매우 커지고 표면 온도가 낮아져 붉게 보이는 이 단계의 이름은 무엇인가요?",
                hint: "태양이 먼 미래에 겪게 될 모습입니다.",
                answer: "적색거성"
            },
           {
                title: "제3관문: 거성의 한계",
                problem: "태양 정도의 질량을 가진 별(적색 거성) 내부에서 핵융합을 통해 최종적으로 만들어질 수 있는 원소들은 무엇인가요? (정답 예시: OO와 OO)",
                hint: "연필심의 성분인 탄소와 우리가 숨 쉬는 데 필요한 이 원소입니다.",
                answer: "탄소와산소" // 공백 없이 입력하도록 안내
            },
            {
                title: "제4관문: 거대한 별의 종착지",
                problem: "태양보다 질량이 10배 이상 큰 별은 중심부에서 다단계 핵융합 반응이 일어나 양파 껍질 구조를 형성합니다. 이때 별의 **내부(핵융합)**에서 만들어질 수 있는 가장 무거운 원소는 무엇인가요?",
                hint: "이 원소는 매우 안정하여 더 이상 핵융합이 일어나지 않습니다. 원소 기호는 Fe입니다.",
                answer: "철"
            },
            {
                title: "제5관문: 우주의 대폭발",
                problem: "질량이 큰 별은 중심부에 '철'이 형성된 후 급격히 수축하다가 거대한 폭발을 일으킵니다. 이때 발생하는 막대한 에너지로 금(Au), 우라늄(U) 등 철보다 무거운 원소가 생성됩니다. 이 폭발 현상을 무엇이라 하나요?",
                hint: "밤하늘에 갑자기 밝은 별이 나타난 것처럼 보인다고 해서 붙여진 이름입니다.",
                answer: "초신성"
            },
            {
                title: "제6관문: 마지막 잔해",
                problem: "초신성 폭발 이후, 남은 중심부의 질량이 매우 커서 빛조차 빠져나갈 수 없을 정도로 중력이 강력한 천체가 됩니다. 이것의 이름은 무엇인가요?",
                hint: "우리 탐사선이 지금 갇혀 있는 곳의 근원입니다.",
                answer: "블랙홀"
            }
        ];

        const quizArea = document.getElementById('quiz-area');
        const resultDisplay = document.getElementById('result');
        const successArea = document.getElementById('success-area');
        let currentQuestionIndex = 0;

        function showQuestion() {
            if (currentQuestionIndex < questions.length) {
                const questionData = questions[currentQuestionIndex];
                let questionHTML = `
                    <div class="gate">
                        <h3>${questionData.title}</h3>
                        <button class="hint-button" onclick="toggleHint()">힌트 보기</button>
                        <div class="problem">
                            <p>${questionData.problem}</p>
                        </div>
                        <div class="hint-text" id="hint-text-${currentQuestionIndex}">${questionData.hint}</div>
                        <div class="answer-input">
                            <label for="answer-input-${currentQuestionIndex}">정답 코드:</label>
                            <input type="text" id="answer-input-${currentQuestionIndex}" placeholder="정답을 입력하세요">
                            <button class="submit-button" onclick="checkAnswer()">확인</button>
                        </div>
                    </div>
                `;
                quizArea.innerHTML = questionHTML;
                // 이전 결과 표시 초기화
                resultDisplay.style.display = 'none';
                resultDisplay.className = '';
                resultDisplay.textContent = '';
            } else {
                // 모든 문제 해결 후 성공 화면 표시
                quizArea.style.display = 'none';
                successArea.style.display = 'block';
            }
        }

        function toggleHint() {
            const hintText = document.getElementById(`hint-text-${currentQuestionIndex}`);
            const hintButton = document.querySelector('.hint-button');
            if (hintText.style.display === 'block') {
                hintText.style.display = 'none';
                hintButton.textContent = '힌트 보기';
            } else {
                hintText.style.display = 'block';
                hintButton.textContent = '힌트 닫기';
            }
        }

        function checkAnswer() {
            const userAnswerInput = document.getElementById(`answer-input-${currentQuestionIndex}`).value.trim(); // 공백 제거
            const correctAnswer = questions[currentQuestionIndex].answer;

            if (userAnswerInput === correctAnswer) {
                currentQuestionIndex++;
                showQuestion();
                if (currentQuestionIndex === questions.length) {
                     // 마지막 정답 입력 후 바로 성공 화면 표시
                    quizArea.style.display = 'none';
                    successArea.style.display = 'block';
                }
            } else {
                resultDisplay.style.display = 'block';
                resultDisplay.className = 'incorrect';
                resultDisplay.textContent = '❌ 오답입니다. 다시 시도해 보세요!';
            }
        }

        // 초기 문제 표시
        showQuestion();
    </script>
</body>
</html>
