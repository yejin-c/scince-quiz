<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주기율표와 함께하는 전자 배치 학습</title>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --nucleus: #ff6b6b;
            --electron: #4834d4;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: var(--secondary); margin-bottom: 10px; }
        
        /* 주기율표 스타일 */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(30px, 1fr));
            gap: 4px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            max-width: 900px;
        }

        .element {
            aspect-ratio: 1;
            background-color: #eee;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .element:hover { transform: scale(1.1); box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .element.active { background-color: var(--primary); color: white; border-color: var(--secondary); }
        
        .el-z { font-size: 0.7em; opacity: 0.8; }
        .el-symbol { font-weight: bold; font-size: 1.1em; }

        /* 비활성 원소(공백) 스타일 */
        .empty { pointer-events: none; opacity: 0; }
        /* 1-20번 외 원소 가이드용 */
        .others { background-color: #f9f9f9; color: #ccc; cursor: default; }

        /* 학습판 스타 */
        .learning-zone {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        .canvas-container {
            position: relative;
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        canvas { background: #fff; border: 1px solid #eee; border-radius: 15px; cursor: crosshair; }

        .status-panel {
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-header { text-align: center; border-bottom: 2px solid var(--bg); padding-bottom: 15px; margin-bottom: 15px; }
        .info-name { font-size: 24px; font-weight: bold; color: var(--secondary); }
        .info-symbol { font-size: 48px; font-weight: bold; color: var(--primary); }

        .mission-status { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .stat-line { display: flex; justify-content: space-between; font-size: 1.1em; }
        .stat-label { color: #666; }
        .stat-value { font-weight: bold; color: var(--secondary); }
        
        .stat-value.current { color: var(--accent); font-size: 1.3em; }

        .msg-box {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>⚛️ 주기율표 전자 배치 교구</h1>
    <p>주기율표에서 원소를 클릭하고, 아래 모형에 전자를 직접 채워보세요!</p>

    <div class="periodic-table" id="periodicTable">
        </div>

    <div class="learning-zone" id="learningZone" style="display:none;">
        <div class="canvas-container">
            <canvas id="atomCanvas" width="500" height="500"></canvas>
        </div>

        <div class="status-panel">
            <div class="info-header">
                <div class="info-z" id="infoZ"></div>
                <div class="info-symbol" id="infoSymbol"></div>
                <div class="info-name" id="infoName"></div>
            </div>

            <div class="mission-status">
                <div class="stat-line">
                    <span class="stat-label">목표 전자 수:</span>
                    <span class="stat-value" id="targetCount">0</span>
                </div>
                <div class="stat-line">
                    <span class="stat-label">현재 배치 수:</span>
                    <span class="stat-value current" id="currentCount">0</span>
                </div>
            </div>

            <div class="msg-box" id="msgText"></div>
            <button onclick="resetCurrentAtom()" style="margin-top:10px; padding: 8px; cursor:pointer;">이 원소 다시 하기</button>
        </div>
    </div>

<script>
    // 1~20번 원소 데이터
    const elementsData = [
        { z: 1, s: "H", n: "수소", group: 1, period: 1 },
        { z: 2, s: "He", n: "헬륨", group: 18, period: 1 },
        { z: 3, s: "Li", n: "리튬", group: 1, period: 2 },
        { z: 4, s: "Be", n: "베릴륨", group: 2, period: 2 },
        { z: 5, s: "B", n: "붕소", group: 13, period: 2 },
        { z: 6, s: "C", n: "탄소", group: 14, period: 2 },
        { z: 7, s: "N", n: "질소", group: 15, period: 2 },
        { z: 8, s: "O", n: "산소", group: 16, period: 2 },
        { z: 9, s: "F", n: "플루오린", group: 17, period: 2 },
        { z: 10, s: "Ne", n: "네온", group: 18, period: 2 },
        { z: 11, s: "Na", n: "나트륨", group: 1, period: 3 },
        { z: 12, s: "Mg", n: "마그네슘", group: 2, period: 3 },
        { z: 13, s: "Al", n: "알루미늄", group: 13, period: 3 },
        { z: 14, s: "Si", n: "규소", group: 14, period: 3 },
        { z: 15, s: "P", n: "인", group: 15, period: 3 },
        { z: 16, s: "S", n: "황", group: 16, period: 3 },
        { z: 17, s: "Cl", n: "염소", group: 17, period: 3 },
        { z: 18, s: "Ar", n: "아르곤", group: 18, period: 3 },
        { z: 19, s: "K", n: "칼륨", group: 1, period: 4 },
        { z: 20, s: "Ca", n: "칼슘", group: 2, period: 4 }
    ];

    // --- 주기율표 생성 로직 ---
    function createPeriodicTable() {
        const table = document.getElementById('periodicTable');
        
        // 4주기 18족까지의 그리드 생성 (20번 칼슘까지만 필요하므로 4주기 2족까지만 활성화)
        for (let period = 1; period <= 4; period++) {
            for (let group = 1; group <= 18; group++) {
                const elDiv = document.createElement('div');
                
                // 데이터에서 해당 위치의 원소 찾기
                const el = elementsData.find(e => e.group === group && e.period === period);
                
                if (el) {
                    elDiv.className = 'element';
                    elDiv.id = `el-${el.z}`;
                    elDiv.innerHTML = `<div class="el-z">${el.z}</div><div class="el-symbol">${el.s}</div>`;
                    elDiv.onclick = () => selectElement(el.z);
                } else if ((period === 1 && group > 1 && group < 18) || (period < 4 && group > 2 && group < 13)) {
                    // 주기율표의 공백 영역
                    elDiv.className = 'empty';
                } else if (period === 4 && group > 2) {
                     elDiv.className = 'element others'; // 20번 이후는 가이드만
                } else {
                     elDiv.className = 'empty';
                }
                table.appendChild(elDiv);
            }
        }
    }

    // --- 전자 배치 시뮬레이터 로직 (Canvas) ---
    const canvas = document.getElementById('atomCanvas');
    const ctx = canvas.getContext('2d');
    const shellRadii = [70, 120, 170, 220]; // n=1, 2, 3, 4 궤도 반지름
    const shellCapacities = [2, 8, 8, 2]; // 1~20번까지 보어 모형 유효 용량

    let currentAtom = null;
    let placedElectrons = []; // {shellIndex, angle}

    function selectElement(z) {
        // 주기율표 UI 업데이트
        document.querySelectorAll('.element').forEach(e => e.classList.remove('active'));
        document.getElementById(`el-${z}`).classList.add('active');

        // 학습 영역 활성화 및 데이터 설정
        currentAtom = elementsData.find(e => e.z === z);
        placedElectrons = [];
        
        document.getElementById('learningZone').style.display = 'flex';
        document.getElementById('infoZ').innerText = `No. ${currentAtom.z}`;
        document.getElementById('infoSymbol').innerText = currentAtom.s;
        document.getElementById('infoName').innerText = currentAtom.n;
        document.getElementById('targetCount').innerText = currentAtom.z;
        
        document.getElementById('msgText').innerText = "궤도(점선)를 클릭해 전자를 채우세요.";
        document.getElementById('msgText').style.backgroundColor = "#eaf2f8";
        document.getElementById('msgText').style.color = "#333";

        drawAtom();
    }

    function resetCurrentAtom() {
        if(currentAtom) selectElement(currentAtom.z);
    }

    function drawAtom() {
        if (!currentAtom) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // 1. 원자핵 그리기
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.fillStyle = "#ff6b6b";
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.fillText(`+${currentAtom.z}`, cx, cy + 7);

        // 2. 궤도(껍질) 그리기
        shellRadii.forEach((r, i) => {
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = "#ddd";
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]); // 점선
            ctx.stroke();
            ctx.setLineDash([]); // 점선 해제
            
            // 껍질 이름 (n=1, n=2...)
            ctx.fillStyle = "#aaa";
            ctx.font = "12px Arial";
            ctx.fillText(`n=${i+1}`, cx + r + 15, cy + 3);
        });

        // 3. 배치된 전자 그리기
        placedElectrons.forEach(e => {
            const ex = cx + shellRadii[e.shellIndex] * Math.cos(e.angle);
            const ey = cy + shellRadii[e.shellIndex] * Math.sin(e.angle);
            
            ctx.beginPath();
            ctx.arc(ex, ey, 10, 0, Math.PI * 2);
            
            // 전자가 꽉 찬 껍질은 색을 다르게 할 수도 있음 (옵션)
            ctx.fillStyle = "#4834d4"; 
            ctx.fill();
            
            // 전자 테두리
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();
        });

        // 상태판 업데이트
        document.getElementById('currentCount').innerText = placedElectrons.length;

        // 미션 완료 체크
        if (placedElectrons.length === currentAtom.z) {
            const msgBox = document.getElementById('msgText');
            msgBox.innerText = `🎉 완료! ${currentAtom.n} 배치 성공.`;
            msgBox.style.backgroundColor = "#27ae60";
            msgBox.style.color = "white";
        }
    }

    // --- 클릭 이벤트 처리 (전자 배치) ---
    canvas.addEventListener('mousedown', (e) => {
        if (!currentAtom) return;
        
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        const dist = Math.sqrt((mx - cx)**2 + (my - cy)**2);
        
        // 1. 클릭한 위치가 어느 껍질 허용 범위(+-20px)인지 확인
        let foundShellIndex = -1;
        shellRadii.forEach((r, i) => {
            if (Math.abs(dist - r) < 20) foundShellIndex = i;
        });

        const msgBox = document.getElementById('msgText');

        if (foundShellIndex !== -1) {
            // 미션 완료 상태면 클릭 막기
            if(placedElectrons.length >= currentAtom.z) return;

            // 2. 규칙 체크: 안쪽 껍질이 다 찼는지 확인
            for (let i = 0; i < foundShellIndex; i++) {
                const countInShell = placedElectrons.filter(pe => pe.shellIndex === i).length;
                if (countInShell < shellCapacities[i]) {
                    msgBox.innerText = `❌ 규칙 위반: ${i+1}번 껍질부터 채우세요!`;
                    msgBox.style.backgroundColor = "#e74c3c";
                    msgBox.style.color = "white";
                    return; 
                }
            }

            // 3. 규칙 체크: 해당 껍질이 용량을 초과했는지 확인
            const currentShellCount = placedElectrons.filter(pe => pe.shellIndex === foundShellIndex).length;
            if (currentShellCount >= shellCapacities[foundShellIndex]) {
                msgBox.innerText = `❌ 꽉 참: ${foundShellIndex+1}번 껍질은 최대 ${shellCapacities[foundShellIndex]}개입니다.`;
                msgBox.style.backgroundColor = "#e74c3c";
                msgBox.style.color = "white";
                return;
            }

            // 전 추가
            const angle = Math.atan2(my - cy, mx - cx);
            placedElectrons.push({ shellIndex: foundShellIndex, angle: angle });
            
            // 정상 배치 메시지
            msgBox.innerText = `전자를 ${foundShellIndex+1}번 껍질에 배치했습니다.`;
            msgBox.style.backgroundColor = "#eaf2f8";
            msgBox.style.color = "#333";
            
            drawAtom();
        }
    });

    // 초기화: 주기율표 생성
    createPeriodicTable();
</script>

</body>
</html>
